# Liquor Kings — Fly.io configuration for the API + admin SPA.
#
# App name is intentionally simple. Region defaults to ord (Chicago) for
# decent latency to Michigan stores; matches Supabase us-east-1 well enough.
#
# Secrets (set via `flyctl secrets set KEY=value`) — see deployment.runbook.md:
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   LK_CREDENTIAL_ENCRYPTION_KEY, LK_ALLOW_ORDER_SUBMISSION (no/yes),
#   LK_ADMIN_TOKEN (optional), SENTRY_DSN (optional).
#
# Non-secret env values live in [env] below.

app = "liquor-kings"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  # Default to dry_run-only in production until per-store ARM is wired.
  LK_ALLOW_ORDER_SUBMISSION = "no"
  # Operator admin SPA served from the location baked into the image.
  OPERATOR_REVIEW_ADMIN_DIST = "/app/apps/admin/dist"
  # Chromium-in-container sandbox flags — read by the launch wrapper.
  LK_CHROMIUM_SANDBOX = "off"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

# 1 GB / 1 shared CPU is the floor for Chromium stability.
# Bump to 2 GB if we see OOM during real RPA runs.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
