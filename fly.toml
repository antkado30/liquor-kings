# Liquor Kings — Fly.io configuration for the API + admin SPA.
#
# App name is intentionally simple. Region defaults to ord (Chicago) for
# decent latency to Michigan stores; matches Supabase us-east-1 well enough.
#
# Secrets (set via `flyctl secrets set KEY=value`) — see deployment.runbook.md:
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   LK_CREDENTIAL_ENCRYPTION_KEY, LK_ALLOW_ORDER_SUBMISSION (no/yes),
#   LK_ADMIN_TOKEN (optional), SENTRY_DSN (optional).
#
# Non-secret env values live in [env] below.

app = "liquor-kings"
primary_region = "ord"
kill_signal = "SIGINT"
# 5m is Fly's HARD MAX for kill_timeout (anything higher is rejected). We use
# the full cap so an in-flight RPA run has the best chance of finishing
# gracefully on SIGINT (deploy/restart). If a run is still mid-flight at 5m,
# Fly force-kills the machine — the orphan reaper picks it up within ~15 min
# and marks it failed (status='running' with stale heartbeat → never
# auto-retried, no double-order risk).
kill_timeout = "5m"

[build]
  dockerfile = "Dockerfile"

# Two processes share this image:
#   - `app`    serves HTTP (the Express API). Bound to [http_service].
#   - `worker` is the persistent RPA daemon — claims execution_runs from the
#     queue and runs all 5 stages, one run at a time. Scale by adding
#     machines: `fly scale count worker=N`.
# Worker split 2026-06-08: the RPA worker moved to its own app
# (liquor-kings-worker, fly.worker.toml + Dockerfile.worker) so THIS app runs
# only the slim API/web image and deploys fast. This app no longer runs any
# RPA / Chromium process.
[processes]
  app = "npm start"

[env]
  # Default to dry_run-only in production until per-store ARM is wired.
  LK_ALLOW_ORDER_SUBMISSION = "no"
  # Operator admin SPA served from the location baked into the image.
  OPERATOR_REVIEW_ADMIN_DIST = "/app/apps/admin/dist"
  # Chromium-in-container sandbox flags — read by the launch wrapper.
  LK_CHROMIUM_SANDBOX = "off"
  PORT = "8080"
  # Worker daemon reaches the API via the public URL. Tried Fly's internal-DNS
  # pattern (`app.process.liquor-kings.internal:8080`) first — boot logs were
  # clean but every fetch threw `fetch failed`, so the DNS/routing wasn't
  # working in this setup. The public URL is the reliable path; the proxy hop
  # adds negligible latency for pilot scale and we can optimize back to
  # internal-only later.
  API_BASE_URL = "https://liquor-kings.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop is OFF. min_machines_running alone did NOT keep a machine up
  # (Fly only honours it under traffic, not for an idle app), so machines kept
  # powering down — breaking `fly ssh console` and dropping RPA test runs.
  # A production order-placing service should stay up anyway (API + price-book
  # cron must be responsive). The extra always-on machine costs a few $/month.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    # Tuned 2026-05-27 to make rolling deploys finalize faster. The Express
    # API typically reports "Server running on port 8080" within 2-4s of
    # boot (see app boot logs), so a 10s grace + 5s interval gets the
    # first passing check in well under 30s. The previous 30s/30s combo
    # was making `fly deploy` hang for minutes per machine waiting for
    # the first scheduled check to even run.
    grace_period = "10s"
    interval = "5s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# The API serves HTTP and is cheap. (The Chromium worker is a separate app now.)
[[vm]]
  processes = ["app"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
